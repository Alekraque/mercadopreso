server:
  port: 8080

spring:
  application:
    name: order

  rabbitmq:
    virtual-host: order
    password: admin
    username: admin
    host: 10.3.170.100
    port: 5672

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

services:
  shipping:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health, info, env, beans