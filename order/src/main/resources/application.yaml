server:
  port: 8080

spring:
  application:
    name: order

  datasource:
    url:  jdbc:h2:mem:mercadopreso_db
    driver-class-name: org.h2.Driver
    username: admin
    password: admin

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

services:
  shipping:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health, info, env, beans